<svg width="680" height="220" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Impact Property Media logo</title>
  <desc>Impact Property Media logo with a camera aperture and property pin icon</desc>

  <rect x="0" y="0" width="680" height="220" fill="#111213" rx="10"/>

  <!-- Camera aperture / lens ring -->
  <circle cx="290" cy="100" r="42" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="290" cy="100" r="28" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Property location pin inside lens -->
  <circle cx="290" cy="92" r="10" fill="#ffffff"/>
  <path d="M284,99 Q290,116 290,116 Q290,116 296,99" fill="#ffffff"/>
  <circle cx="290" cy="92" r="4" fill="#111213"/>

  <!-- Aperture blades (6 tick marks) -->
  <line x1="290" y1="58" x2="290" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="290" y1="142" x2="290" y2="150" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="83" x2="249" y2="79" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="324" y1="117" x2="331" y2="121" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="117" x2="249" y2="121" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="324" y1="83" x2="331" y2="79" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Text -->
  <text x="345" y="95" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="5" fill="#ffffff">IMPACT</text>
  <text x="345" y="114" font-family="Georgia, serif" font-size="12.5" font-weight="400" letter-spacing="4" fill="#aaaaaa">PROPERTY MEDIA</text>

</svg>
